underscores_in_headers on;

server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Gateway reverse proxy (same-origin → CORS 불필요) ────
    location /api/ {
        proxy_pass http://gateway-service:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # API docs — 내부 서비스 URL을 portal origin으로 치환
    location /v3/ {
        proxy_pass http://gateway-service:8080;
        proxy_set_header Host $host;
        proxy_set_header Accept-Encoding "";

        sub_filter_types application/json;
        sub_filter_once off;
        sub_filter 'http://qa-service:9100'      '/api/qa';
        sub_filter 'http://auth-server:9000'     '';
        sub_filter 'http://config-server:8888'   '';
        sub_filter 'http://gateway-service:8080' '';
    }

    location /webjars/ {
        proxy_pass http://gateway-service:8080;
        proxy_set_header Host $host;
    }

    location /swagger-ui {
        proxy_pass http://gateway-service:8080;
        proxy_set_header Host $host;
    }

    location /actuator/ {
        proxy_pass http://gateway-service:8080;
        proxy_set_header Host $host;
    }
}
