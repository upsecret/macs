server:
  port: 9000

spring:
  application:
    name: auth-server
  data:
    redis:
      host: redis
      port: 6379

jwt:
  secret: macs-jwt-secret-key-for-development-only-change-in-production
  expiration: 3600

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method

otel:
  exporter:
    otlp:
      endpoint: http://otel-collector:4317
