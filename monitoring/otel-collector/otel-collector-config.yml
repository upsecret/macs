# ============================================================
# MACS OpenTelemetry Collector Configuration
# ============================================================

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  # Spring Boot Actuator prometheus 스크래핑
  prometheus:
    config:
      scrape_configs:
        - job_name: "macs-services"
          scrape_interval: 15s
          metrics_path: /actuator/prometheus
          static_configs:
            - targets:
                - "gateway-service:8080"
                - "config-server:8888"
                - "auth-server:9000"
              labels:
                env: "dev"

processors:
  batch:
    timeout: 5s
    send_batch_size: 1024

  memory_limiter:
    check_interval: 1s
    limit_mib: 512
    spike_limit_mib: 128

  resource:
    attributes:
      - key: deployment.environment
        value: dev
        action: upsert

exporters:
  # Traces → APM Server (OTLP gRPC)
  otlp_grpc/apm:
    endpoint: apm-server:8200
    tls:
      insecure: true

  # Metrics, Logs → Elasticsearch (data stream 모드)
  elasticsearch:
    endpoints: ["http://elasticsearch:9200"]
    user: elastic
    password: elastic_password
    mapping:
      mode: ecs
    logs_dynamic_index:
      enabled: true
    metrics_dynamic_index:
      enabled: true
    traces_dynamic_index:
      enabled: true

  debug:
    verbosity: basic

service:
  extensions: [health_check]

  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [otlp_grpc/apm]

    metrics:
      receivers: [otlp, prometheus]
      processors: [memory_limiter, resource, batch]
      exporters: [elasticsearch]

    logs:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [elasticsearch]

  telemetry:
    logs:
      level: info
    metrics:
      readers:
        - pull:
            exporter:
              prometheus:
                host: 0.0.0.0
                port: 8888

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
