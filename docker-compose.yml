# ============================================================
# MACS System – Full Stack (Infra + Applications)
#
# 실행:
#   전체:       docker compose up -d
#   인프라만:   docker compose up -d oracle redis kafka elasticsearch es-setup kibana apm-server otel-collector elastic-agent
#   앱만:       docker compose up -d admin-server auth-server gateway-service portal
#   빌드+실행:  docker compose up -d --build
# ============================================================

services:

  # ── Oracle Database ──────────────────────────────────────────────
  oracle:
    image: gvenzl/oracle-free:23-slim
    container_name: macs-oracle
    ports:
      - "1521:1521"
    environment:
      ORACLE_PASSWORD: macs_password
    volumes:
      - oracle-data:/opt/oracle/oradata
      - ./infra/oracle/init.sql:/container-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - macs-network

  # ── Redis ────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: macs-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - macs-network

  # ── Kafka (KRaft, no Zookeeper) ─────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.7.1
    container_name: macs-kafka
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:29092"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - macs-network

  # ── Elasticsearch ────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    container_name: macs-elasticsearch
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      discovery.type: single-node
      xpack.security.enabled: "true"
      xpack.security.http.ssl.enabled: "false"
      xpack.security.transport.ssl.enabled: "false"
      ELASTIC_PASSWORD: elastic_password
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - es-data:/usr/share/elasticsearch/data
      - ./monitoring/elasticsearch/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -s -u elastic:elastic_password http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 40s
    networks:
      - macs-network

  # ── ES 내장 유저 비밀번호 초기화 ──────────────────────────────────
  es-setup:
    image: curlimages/curl:latest
    container_name: macs-es-setup
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: "no"
    entrypoint: ["sh", "-c"]
    command:
      - |
        curl -sf -X POST -u elastic:elastic_password \
          http://elasticsearch:9200/_security/user/kibana_system/_password \
          -H "Content-Type: application/json" \
          -d '{"password":"elastic_password"}'
        echo " kibana_system password set"
    networks:
      - macs-network

  # ── Kibana ───────────────────────────────────────────────────────
  kibana:
    image: docker.elastic.co/kibana/kibana:8.17.0
    container_name: macs-kibana
    ports:
      - "5601:5601"
    volumes:
      - ./monitoring/kibana/kibana.yml:/usr/share/kibana/config/kibana.yml:ro
    depends_on:
      es-setup:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:5601/api/status | grep -q '\"overall\"'"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 60s
    networks:
      - macs-network

  # ── APM Server ───────────────────────────────────────────────────
  apm-server:
    image: docker.elastic.co/apm/apm-server:8.17.0
    container_name: macs-apm-server
    ports:
      - "8200:8200"
    volumes:
      - ./monitoring/apm-server/apm-server.yml:/usr/share/apm-server/apm-server.yml:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
      kibana:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "apm-server export config > /dev/null 2>&1 || exit 0"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s
    networks:
      - macs-network

  # ── OTel Collector ───────────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: macs-otel-collector
    ports:
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./monitoring/otel-collector/otel-collector-config.yml:/etc/otelcol-contrib/config.yaml:ro
    depends_on:
      apm-server:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:13133/"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - macs-network

  # ── Elastic Agent ────────────────────────────────────────────────
  elastic-agent:
    image: docker.elastic.co/beats/elastic-agent:8.17.0
    container_name: macs-elastic-agent
    volumes:
      - ./monitoring/elastic-agent/elastic-agent.yml:/usr/share/elastic-agent/elastic-agent.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - elastic-agent-data:/usr/share/elastic-agent/state
    depends_on:
      kibana:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - macs-network

  # ── Admin Server ───────────────────────────────────────────
  admin-server:
    build:
      context: .
      dockerfile: admin-server/Dockerfile
    container_name: macs-admin-server
    ports:
      - "8888:8888"
    environment:
      SPRING_PROFILES_ACTIVE: docker,jdbc
      SPRING_DATASOURCE_URL: jdbc:oracle:thin:@oracle:1521/${ORACLE_SERVICE_NAME:-FREE}
      SPRING_DATASOURCE_USERNAME: macs
      SPRING_DATASOURCE_PASSWORD: macs_password
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
    depends_on:
      oracle:
        condition: service_healthy
      kafka:
        condition: service_healthy
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8888/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 40s
    networks:
      - macs-network

  # ── Auth Server ────────────────────────────────────────────
  auth-server:
    build:
      context: .
      dockerfile: auth-server/Dockerfile
    container_name: macs-auth-server
    ports:
      - "9000:9000"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_R2DBC_URL: r2dbc:oracle://oracle:1521/${ORACLE_SERVICE_NAME:-FREE}
      SPRING_R2DBC_USERNAME: macs
      SPRING_R2DBC_PASSWORD: macs_password
      SPRING_DATA_REDIS_HOST: redis
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
    depends_on:
      oracle:
        condition: service_healthy
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:9000/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - macs-network

  # ── Gateway Service ────────────────────────────────────────
  gateway-service:
    build:
      context: .
      dockerfile: gateway-service/Dockerfile
    container_name: macs-gateway-service
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_CONFIG_IMPORT: "optional:configserver:http://admin-server:8888"
      SPRING_DATA_REDIS_HOST: redis
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
    depends_on:
      admin-server:
        condition: service_healthy
      auth-server:
        condition: service_healthy
      redis:
        condition: service_healthy
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - macs-network

  # ── Portal (React) ────────────────────────────────────────
  portal:
    build:
      context: ./portal
      dockerfile: Dockerfile
    container_name: macs-portal
    ports:
      - "3000:3000"
    depends_on:
      gateway-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - macs-network

volumes:
  oracle-data:
  redis-data:
  kafka-data:
  es-data:
  elastic-agent-data:

networks:
  macs-network:
    driver: bridge
