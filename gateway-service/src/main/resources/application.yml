server:
  port: 8080

spring:
  application:
    name: gateway-service
  config:
    import: "optional:configserver:http://admin-server:8888"
  cloud:
    config:
      fail-fast: false
    bus:
      enabled: true
    gateway:
      server:
        webflux:
          default-filters:
            - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE
          # routes 는 admin-server(config server) PROPERTIES 테이블에서 주입됨.
          # 수정은 portal /route-config → "변경사항 반영" 으로 실시간 반영.
          # 키 prefix: spring.cloud.gateway.server.webflux.routes[N].* (4.x 이후)

  data:
    redis:
      host: redis
      port: 6379
  kafka:
    bootstrap-servers: kafka:29092

# ── Actuator ─────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus,gateway,busrefresh,refresh,env
  endpoint:
    health:
      show-details: always
    gateway:
      access: read_only
    env:
      show-values: ALWAYS

# ── SpringDoc Swagger ────────────────────────────────────────
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: auth-server
        url: /v3/api-docs/auth-server
      - name: admin-server
        url: /v3/api-docs/admin-server

# ── OTel ─────────────────────────────────────────────────────
otel:
  exporter:
    otlp:
      endpoint: http://otel-collector:4317

# ── MACS Gateway Logging ─────────────────────────────────────
# RequestResponseLoggingFilter 제어. 모든 필드는 env 로 override 가능:
#   MACS_GATEWAY_LOGGING_BODY=false 등
macs:
  gateway:
    logging:
      # 요청/응답 body 를 로그에 포함. 민감 데이터 감안해 운영에선 false 권장.
      body: true
      # 요청/응답 헤더 dump. Authorization/Cookie 류는 자동 마스킹.
      headers: true
      # body 당 최대 로깅 바이트. 초과분은 truncated.
      max-body-size: 10240
      # true 면 /actuator/** 는 logging 건너뜀 (health check 잡음 방지).
      skip-actuator: true
