server:
  port: 8080

spring:
  application:
    name: gateway-service
  config:
    import: "optional:configserver:http://config-server:8888"
  cloud:
    config:
      fail-fast: false
    bus:
      enabled: true
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE
      routes:
        # ── Service Routes (defaults, overridden by config-server) ──
        - id: auth-route
          uri: http://auth-server:9000
          predicates:
            - Path=/api/auth/**
        - id: config-route
          uri: http://config-server:8888
          predicates:
            - Path=/api/config/**
        # ── Swagger Aggregation Routes ──
        - id: auth-api-docs
          uri: http://auth-server:9000
          predicates:
            - Path=/v3/api-docs/auth-server
          filters:
            - RewritePath=/v3/api-docs/auth-server, /v3/api-docs
        - id: config-api-docs
          uri: http://config-server:8888
          predicates:
            - Path=/v3/api-docs/config-server
          filters:
            - RewritePath=/v3/api-docs/config-server, /v3/api-docs

  data:
    redis:
      host: redis
      port: 6379
  kafka:
    bootstrap-servers: kafka:29092

# ── Rate Limit ───────────────────────────────────────────────
gateway:
  rate-limit:
    capacity: 100
    refill-tokens: 100
    refill-duration: PT1M

# ── Actuator ─────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus,gateway
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true

# ── SpringDoc Swagger ────────────────────────────────────────
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: auth-server
        url: /v3/api-docs/auth-server
      - name: config-server
        url: /v3/api-docs/config-server

# ── OTel ─────────────────────────────────────────────────────
otel:
  exporter:
    otlp:
      endpoint: http://otel-collector:4317
