server:
  port: 8080

spring:
  application:
    name: gateway-service
  config:
    import: "optional:configserver:http://admin-server:8888"
  cloud:
    config:
      fail-fast: false
    bus:
      enabled: true
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE
      routes:
        # ── Service Routes (기본 유량: 50/s, burst 100) ──
        - id: auth-route
          uri: http://auth-server:9000
          predicates:
            - Path=/api/auth/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 50
                redis-rate-limiter.burstCapacity: 100
                key-resolver: "#{@headerKeyResolver}"
                deny-empty-key: false
        - id: admin-route
          uri: http://admin-server:8888
          predicates:
            - Path=/api/config/**,/api/admin/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 50
                redis-rate-limiter.burstCapacity: 100
                key-resolver: "#{@headerKeyResolver}"
                deny-empty-key: false
            - name: AuthValidation
              args:
                connector: portal

        # ── Swagger Aggregation ──
        - id: auth-api-docs
          uri: http://auth-server:9000
          predicates:
            - Path=/v3/api-docs/auth-server
          filters:
            - RewritePath=/v3/api-docs/auth-server, /v3/api-docs
        - id: admin-api-docs
          uri: http://admin-server:8888
          predicates:
            - Path=/v3/api-docs/admin-server
          filters:
            - RewritePath=/v3/api-docs/admin-server, /v3/api-docs

  data:
    redis:
      host: redis
      port: 6379
  kafka:
    bootstrap-servers: kafka:29092

# ── Actuator ─────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus,gateway
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true

# ── SpringDoc Swagger ────────────────────────────────────────
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: auth-server
        url: /v3/api-docs/auth-server
      - name: admin-server
        url: /v3/api-docs/admin-server

# ── OTel ─────────────────────────────────────────────────────
otel:
  exporter:
    otlp:
      endpoint: http://otel-collector:4317
