server:
  port: 8080

spring:
  application:
    name: gateway-service
  config:
    import: "optional:configserver:http://admin-server:8888"
  cloud:
    config:
      fail-fast: false
    bus:
      enabled: true
    gateway:
      server:
        webflux:
          default-filters:
            - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE
          # routes 는 admin-server(config server) PROPERTIES 테이블에서 주입됨.
          # 수정은 portal /route-config → "변경사항 반영" 으로 실시간 반영.
          # 키 prefix: spring.cloud.gateway.server.webflux.routes[N].* (4.x 이후)

  data:
    redis:
      host: redis
      port: 6379
  kafka:
    bootstrap-servers: kafka:29092

# ── Actuator ─────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus,gateway,busrefresh,refresh,env
  endpoint:
    health:
      show-details: always
    gateway:
      access: read_only
    env:
      show-values: ALWAYS

# ── SpringDoc Swagger ────────────────────────────────────────
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: auth-server
        url: /v3/api-docs/auth-server
      - name: admin-server
        url: /v3/api-docs/admin-server

# ── OTel ─────────────────────────────────────────────────────
otel:
  exporter:
    otlp:
      endpoint: http://otel-collector:4317
