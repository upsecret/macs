server:
  port: 8888

spring:
  application:
    name: admin-server
  profiles:
    active: jdbc

  datasource:
    url: jdbc:oracle:thin:@oracle:1521/${ORACLE_SERVICE_NAME:FREE}
    username: macs
    password: macs_password
    driver-class-name: oracle.jdbc.OracleDriver

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
        default_schema: MACS
    open-in-view: false

  cloud:
    config:
      server:
        jdbc:
          sql: "SELECT PROP_KEY, PROP_VALUE from MACS.PROPERTIES where APPLICATION=? and PROFILE=? and LABEL=?"
          order: 1
    bus:
      enabled: true

  kafka:
    bootstrap-servers: kafka:29092

management:
  endpoints:
    web:
      exposure:
        include: health,busrefresh,info,prometheus,env
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method

otel:
  exporter:
    otlp:
      endpoint: http://otel-collector:4317

# ── Bootstrap admin (PermissionBootstrapRunner) ──────────────
# admin-server 기동 시 PERMISSION 테이블에 초기 admin 권한을 UPSERT.
# init.sql 이 볼륨 재사용으로 스킵되는 상황을 보정.
macs:
  bootstrap:
    admin:
      enabled: ${MACS_BOOTSTRAP_ADMIN_ENABLED:true}
      employee-number: ${MACS_BOOTSTRAP_ADMIN_EMPLOYEE_NUMBER:2078432}
      app-name: ${MACS_BOOTSTRAP_ADMIN_APP_NAME:portal}
      system: common
      connector: portal
      role: admin
